version: 2

builds:
  - id: kubermatic-ee-downloader
    main: ./cmd/
    binary: kubermatic-ee-downloader
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: kubermatic-ee-downloader
    ids:
      - kubermatic-ee-downloader
    name_template: "kubermatic-ee-downloader_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - none*

checksum:
  name_template: checksums.txt
  algorithm: sha256

release:
  github:
    owner: kubermatic
    name: kubermatic-ee-downloader

changelog:
  use: github-native
